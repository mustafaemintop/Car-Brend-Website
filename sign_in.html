<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üye Ol | Marka İsmi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="sign-style.css">
</head>

<body>

    <div class="container d-flex justify-content-center">
        <div class="signup-container">
            <h2 class="text-center mb-4">Sign Up</h2>
            <div id="successMessage" class="mt-3"></div>

            <form id="registerForm">
                <div class="mb-3">
                    <label for="name" class="form-label">Name Surname </label>
                    <input type="text" class="form-control" id="kullaniciAdiInput" placeholder="Enter your name">
                    <div id="nameError" class="error-msg"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="example@gmail.com">
                    <div id="emailError" class="error-msg"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Create your password">
                    <div id="passwordError" class="error-msg"></div>
                </div>
                <button type="submit" id="kayitBtn" class="btn btn-dark w-100 mt-3">Sign Up</button>

            </form>

            <div class="text-center mt-3">
                <a href="index.html" class="text-decoration-none text-muted small">Return To Main Page</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', function (event) {
            event.preventDefault(); // Formun sayfayı yenilemesini engeller

            document.getElementById('nameError').innerText = "";
            document.getElementById('emailError').innerText = "";
            document.getElementById('passwordError').innerText = "";

            const name = document.getElementById('kullaniciAdiInput').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            let hasError = false;

            // İsim Kontrolü
            if (name.length < 3) {
                document.getElementById('nameError').innerText = "İsim en az 3 karakter olmalıdır.";
                hasError = true;
            }

            // E-posta Kontrolü
            const turkishChars = /[ıİğĞüÜşŞöÖçÇ]/;
            if (turkishChars.test(email)) {
                document.getElementById('emailError').innerText = "E-postada Türkçe karakter kullanılamaz.";
                hasError = true;
            }

            if (!(email.toLowerCase().endsWith('@gmail.com') || email.toLowerCase().endsWith('@hotmail.com'))) {
                document.getElementById('emailError').innerText += " Sadece @gmail.com veya @hotmail.com kabul edilir.";
                hasError = true;
            }

            // Şifre Kontrolü
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            if (password.length < 6 || !hasLetter || !hasNumber) {
                document.getElementById('passwordError').innerText = "Şifre en az 6 karakter olmalı, hem sayı hem harf içermelidir.";
                hasError = true;
            }


            if (!hasError) {

                localStorage.setItem("storedUserName", name);
                const successDiv = document.getElementById("successMessage");
                successDiv.innerHTML = `
        <div class="alert alert-success text-center">
            Kayıt başarıyla tamamlandı! Ana sayfaya yönlendiriliyorsunuz...
        </div>
    `;

                // 2 saniye sonra otomatik yönlendir.
                setTimeout(function () {
                    window.location.href = "index.html";
                }, 2000);
            }
        });
    </script>


</body>

</html>
